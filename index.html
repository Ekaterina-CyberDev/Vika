<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Вика, с днем рождения! 🎉</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      background: linear-gradient(145deg, #0b0e1a 0%, #1a1f35 100%);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 12px;
      overflow-x: hidden;
      position: relative;
      cursor: default;
      user-select: none;
      touch-action: pan-y;
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 40px;
      padding: 30px 16px 25px;
      max-width: 700px;
      width: 100%;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
      z-index: 10;
      position: relative;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 800;
      background: linear-gradient(to right, #f7e05e, #ffb07c, #ff7eb3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 1rem;
      opacity: 0.8;
      font-weight: 300;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }

    .subtitle span {
      color: #ffb07c;
      font-weight: 600;
      -webkit-text-fill-color: #ffb07c;
    }

    .timer-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin: 12px 0 18px;
    }

    .timer-item {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 24px;
      padding: 12px 4px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .timer-number {
      font-size: 2.8rem;
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(180deg, #fff 30%, #b3b9e0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }

    .timer-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.6;
      margin-top: 4px;
    }

    .btn-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin: 12px 0 8px;
    }

    .action-btn {
      border: none;
      padding: 14px 18px;
      border-radius: 60px;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 1px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      flex: 1 1 auto;
      min-width: 120px;
      touch-action: manipulation;
      position: relative;
      overflow: hidden;
    }

    .action-btn:active {
      transform: scale(0.94);
    }

    #fireBtn {
      background: linear-gradient(135deg, #ff7eb3, #ff758c);
      box-shadow: 0 8px 25px rgba(255, 117, 140, 0.35);
    }

    #kissBtn {
      background: linear-gradient(135deg, #f7e05e, #ffb07c);
      box-shadow: 0 8px 25px rgba(255, 200, 100, 0.3);
    }

    .kiss-counter {
      font-size: 1.2rem;
      margin: 6px 0 12px;
      opacity: 0.9;
    }

    .kiss-counter span {
      font-size: 1.8rem;
      font-weight: 800;
      color: #ff7eb3;
      -webkit-text-fill-color: #ff7eb3;
    }

    .wishes-slider {
      background: rgba(0, 0, 0, 0.25);
      border-radius: 32px;
      padding: 18px 14px;
      margin: 14px 0 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      min-height: 100px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .wish-text {
      font-size: 1.1rem;
      font-weight: 400;
      line-height: 1.5;
      opacity: 0.95;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 6px;
      word-break: break-word;
    }

    .wish-text .emoji-big {
      font-size: 2rem;
      margin-right: 10px;
      flex-shrink: 0;
    }

    .slider-dots {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 12px;
    }

    .slider-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      border: none;
      cursor: pointer;
      transition: 0.3s;
      padding: 0;
      touch-action: manipulation;
    }

    .slider-dot.active {
      background: #ff7eb3;
      box-shadow: 0 0 20px rgba(255, 117, 140, 0.5);
      transform: scale(1.2);
    }

    .music-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 100;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 60px;
      padding: 10px 16px;
      color: #fff;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
      touch-action: manipulation;
    }

    .music-btn:active {
      transform: scale(0.95);
    }

    .music-btn .icon {
      font-size: 1.3rem;
    }

    /* ФОНОВЫЕ СЕРДЦА */
    .heart-float {
      position: fixed;
      font-size: 1.8rem;
      pointer-events: none;
      z-index: 0;
      opacity: 0.15;
      animation: floatHeart 18s infinite ease-in-out;
      user-select: none;
    }

    @keyframes floatHeart {
      0% { transform: translateY(10vh) rotate(0deg) scale(0.8); opacity: 0.08; }
      50% { opacity: 0.25; transform: translateY(-10vh) rotate(20deg) scale(1.2); }
      100% { transform: translateY(10vh) rotate(0deg) scale(0.8); opacity: 0.08; }
    }

    /* КОНФЕТТИ */
    .confetti-piece {
      position: fixed;
      width: 14px;
      height: 14px;
      top: -20px;
      z-index: 5;
      pointer-events: none;
      opacity: 0.9;
      border-radius: 2px;
      animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
      0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg) scale(0.2); opacity: 0; }
    }

    /* ЛЕТЯЩИЕ СЕРДЦА */
    .flying-heart {
      position: fixed;
      font-size: 2.8rem;
      pointer-events: none;
      z-index: 50;
      animation: flyHeartUp 2s ease-out forwards;
      filter: drop-shadow(0 0 15px rgba(255, 100, 150, 0.6));
    }

    @keyframes flyHeartUp {
      0% { opacity: 1; transform: translateY(0) scale(0.3) rotate(0deg); }
      100% { opacity: 0; transform: translateY(-400px) scale(2) rotate(50deg); }
    }

    /* ВСПЫШКА ПРИ НАЖАТИИ */
    .flash-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 40;
      background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
      opacity: 0;
      animation: flashAnim 0.6s ease-out forwards;
    }

    @keyframes flashAnim {
      0% { opacity: 1; transform: scale(0.5); }
      100% { opacity: 0; transform: scale(2); }
    }

    /* МОДАЛЬНОЕ ОКНО */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(6px);
      z-index: 200;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
      padding: 16px;
    }

    .modal-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .modal-card {
      background: linear-gradient(145deg, #1e243f, #2a3150);
      border-radius: 48px;
      padding: 36px 24px;
      max-width: 480px;
      width: 100%;
      border: 1px solid rgba(255, 215, 0, 0.2);
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
      transform: scale(0.9);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .modal-overlay.show .modal-card {
      transform: scale(1);
    }

    .modal-card h2 {
      font-size: 2rem;
      margin-bottom: 12px;
      background: linear-gradient(to right, #f7e05e, #ffb07c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .modal-card p {
      font-size: 1.1rem;
      line-height: 1.7;
      opacity: 0.9;
      margin-bottom: 20px;
    }

    .modal-card .close-modal {
      background: linear-gradient(135deg, #ff7eb3, #ff758c);
      border: none;
      padding: 14px 36px;
      border-radius: 60px;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 8px 25px rgba(255, 117, 140, 0.3);
      touch-action: manipulation;
    }

    .modal-card .close-modal:active {
      transform: scale(0.95);
    }

    .modal-card.locked .lock-icon {
      font-size: 3.6rem;
      margin-bottom: 12px;
      display: block;
    }

    .modal-card.locked h2 {
      font-size: 1.6rem;
      background: linear-gradient(to right, #aaa, #ddd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .modal-card.locked p {
      opacity: 0.6;
      font-size: 0.95rem;
    }

    .modal-card.locked .close-modal {
      background: #555;
      box-shadow: none;
    }

    .open-card-trigger {
      font-size: 0.85rem;
      margin-top: 8px;
      opacity: 0.7;
      cursor: pointer;
      touch-action: manipulation;
      transition: opacity 0.3s;
    }

    .open-card-trigger:active {
      opacity: 1;
    }

    @media (max-width: 480px) {
      .container { padding: 20px 12px 18px; border-radius: 32px; }
      h1 { font-size: 2.0rem; }
      .timer-number { font-size: 2.2rem; }
      .timer-grid { gap: 6px; }
      .timer-item { padding: 8px 2px; }
      .timer-label { font-size: 0.6rem; }
      .action-btn { font-size: 0.9rem; padding: 12px 14px; min-width: 100px; }
      .kiss-counter { font-size: 1rem; }
      .kiss-counter span { font-size: 1.6rem; }
      .wish-text { font-size: 1rem; }
      .wish-text .emoji-big { font-size: 1.6rem; }
      .flying-heart { font-size: 2.2rem; }
    }

    @media (max-width: 380px) {
      .timer-number { font-size: 1.8rem; }
      .action-btn { font-size: 0.8rem; padding: 10px 10px; min-width: 80px; }
      h1 { font-size: 1.7rem; }
    }
  </style>
</head>
<body>

  <div id="hearts-container"></div>

  <button class="music-btn" id="musicToggle">
    <span class="icon">🔇</span>
    <span id="musicLabel">Включить</span>
  </button>

  <div class="container">
    <h1>🎂 С Днём Рождения!</h1>
    <div class="subtitle">Моя <span>самая лучшая</span> сестра ❤️</div>

    <div class="timer-grid">
      <div class="timer-item">
        <div class="timer-number" id="days">00</div>
        <div class="timer-label">Дней</div>
      </div>
      <div class="timer-item">
        <div class="timer-number" id="hours">00</div>
        <div class="timer-label">Часов</div>
      </div>
      <div class="timer-item">
        <div class="timer-number" id="minutes">00</div>
        <div class="timer-label">Минут</div>
      </div>
      <div class="timer-item">
        <div class="timer-number" id="seconds">00</div>
        <div class="timer-label">Секунд</div>
      </div>
    </div>

    <div class="kiss-counter">
      💋 Поцелуев: <span id="kissCount">0</span>
    </div>

    <div class="btn-group">
      <button class="action-btn" id="fireBtn">🎉 Фейерверк</button>
      <button class="action-btn" id="kissBtn">💋 Чмок!</button>
    </div>

    <div class="wishes-slider">
      <div class="wish-text" id="wishText">
        <span class="emoji-big">🌟</span>
        Ты — моё самое яркое вдохновение!
      </div>
      <div class="slider-dots" id="sliderDots"></div>
    </div>

    <div class="open-card-trigger" id="openCardTrigger">
      ❤️ Нажми, чтобы открыть поздравление
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-card" id="modalCard">
      <div id="modalContent">
        <span class="lock-icon">🔒</span>
        <h2>Ещё не время!</h2>
        <p id="lockMessage">Откроется 8 июля 🎂</p>
        <button class="close-modal" id="closeModal">Закрыть</button>
      </div>
    </div>
  </div>

  <audio id="bgMusic" loop preload="auto">
    <source src="barbariki.mp3" type="audio/mpeg">
  </audio>

  <script>
    (function() {
      "use strict";

      const BIRTHDAY_DATE = new Date('2026-07-08T00:00:00');
      const birthday = BIRTHDAY_DATE.getTime();

      const today = new Date();
      const isBirthday =
        today.getDate() === BIRTHDAY_DATE.getDate() &&
        today.getMonth() === BIRTHDAY_DATE.getMonth();

      // ТАЙМЕР
      const daysEl = document.getElementById('days');
      const hoursEl = document.getElementById('hours');
      const minutesEl = document.getElementById('minutes');
      const secondsEl = document.getElementById('seconds');

      function updateTimer() {
        const now = Date.now();
        let diff = birthday - now;
        if (diff < 0) diff = 0;

        daysEl.textContent = String(Math.floor(diff / (1000 * 60 * 60 * 24))).padStart(2, '0');
        hoursEl.textContent = String(Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, '0');
        minutesEl.textContent = String(Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
        secondsEl.textContent = String(Math.floor((diff % (1000 * 60)) / 1000)).padStart(2, '0');
      }

      updateTimer();
      setInterval(updateTimer, 1000);

      // ФОНОВЫЕ СЕРДЦА
      const heartsContainer = document.getElementById('hearts-container');
      const heartSymbols = ['♥', '❤', '💖', '💗', '💘'];

      for (let i = 0; i < 22; i++) {
        const heart = document.createElement('div');
        heart.className = 'heart-float';
        heart.textContent = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
        heart.style.left = Math.random() * 100 + '%';
        heart.style.top = Math.random() * 100 + '%';
        heart.style.fontSize = (1.2 + Math.random() * 2.4) + 'rem';
        heart.style.animationDuration = (14 + Math.random() * 20) + 's';
        heart.style.animationDelay = (Math.random() * 14) + 's';
        heart.style.opacity = 0.06 + Math.random() * 0.2;
        heartsContainer.appendChild(heart);
      }

      // КОНФЕТТИ
      function createConfetti(count = 90) {
        const colors = ['#ff7eb3', '#ffb07c', '#f7e05e', '#6dd5ed', '#a18cd1', '#fbc2eb', '#ff6a88', '#8ec5fc', '#ffd700'];
        const container = document.body;

        for (let i = 0; i < count; i++) {
          const piece = document.createElement('div');
          piece.className = 'confetti-piece';
          const size = 8 + Math.random() * 14;
          const color = colors[Math.floor(Math.random() * colors.length)];
          const left = Math.random() * 100;
          const duration = 2.5 + Math.random() * 3.5;
          const delay = Math.random() * 0.9;

          piece.style.width = size + 'px';
          piece.style.height = size + 'px';
          piece.style.background = color;
          piece.style.left = left + '%';
          piece.style.animationDuration = duration + 's';
          piece.style.animationDelay = delay + 's';
          piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
          piece.style.boxShadow = `0 0 8px ${color}`;

          container.appendChild(piece);
          setTimeout(() => { if (piece.parentNode) piece.remove(); }, (duration + delay) * 1000 + 200);
        }
      }

      // ВСПЫШКА
      function createFlash() {
        const flash = document.createElement('div');
        flash.className = 'flash-overlay';
        document.body.appendChild(flash);
        setTimeout(() => { if (flash.parentNode) flash.remove(); }, 700);
      }

      // ЛЕТЯЩИЕ СЕРДЦА
      function flyHearts(count = 14) {
        const symbols = ['💋', '❤️', '💖', '💗', '♥️', '✨', '💕', '🌸', '🌺'];
        for (let i = 0; i < count; i++) {
          const el = document.createElement('div');
          el.className = 'flying-heart';
          el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
          el.style.left = (10 + Math.random() * 80) + '%';
          el.style.top = (20 + Math.random() * 50) + '%';
          el.style.fontSize = (2.2 + Math.random() * 3) + 'rem';
          el.style.animationDuration = (1.6 + Math.random() * 1.6) + 's';
          document.body.appendChild(el);
          setTimeout(() => { if (el.parentNode) el.remove(); }, 3500);
        }
      }

      // ФЕЙЕРВЕРК
      const fireBtn = document.getElementById('fireBtn');
      fireBtn.addEventListener('click', function(e) {
        e.preventDefault();
        createConfetti(150);
        createFlash();
        this.style.transform = 'scale(0.94)';
        setTimeout(() => { this.style.transform = ''; }, 150);
        const orig = this.textContent;
        this.textContent = '✨🎇 Ура! 🎇✨';
        setTimeout(() => { this.textContent = orig; }, 1000);
      });

      // Дублируем для touch
      fireBtn.addEventListener('touchstart', function(e) {
        // просто чтобы сработал click
      }, { passive: true });

      // ПОЦЕЛУИ
      let kissCount = 0;
      const kissCountEl = document.getElementById('kissCount');
      const kissBtn = document.getElementById('kissBtn');

      kissBtn.addEventListener('click', function(e) {
        e.preventDefault();
        kissCount++;
        kissCountEl.textContent = kissCount;
        flyHearts(16);
        createConfetti(35);
        createFlash();

        this.style.transform = 'scale(0.92)';
        setTimeout(() => { this.style.transform = ''; }, 150);

        const orig = this.textContent;
        this.textContent = '😘💕 Чмок!';
        setTimeout(() => { this.textContent = '💋 Чмок!'; }, 700);
      });

      kissBtn.addEventListener('touchstart', function(e) {
        // пассивный слушатель
      }, { passive: true });

      // СЛАЙДЕР ПОЖЕЛАНИЙ
      const wishes = [
        { emoji: '🌟', text: 'Ты — моё самое яркое вдохновение!' },
        { emoji: '🌈', text: 'Пусть жизнь будет такой же красочной, как радуга!' },
        { emoji: '🦋', text: 'Летай высоко и никого не слушай. Ты — особенная!' },
        { emoji: '🌺', text: 'Твоя улыбка согревает всех вокруг. Сияй!' },
        { emoji: '💎', text: 'Ты — настоящий бриллиант. С Днём Рождения!' }
      ];

      let currentWish = 0;
      const wishText = document.getElementById('wishText');
      const dotsContainer = document.getElementById('sliderDots');

      wishes.forEach((_, idx) => {
        const dot = document.createElement('button');
        dot.className = 'slider-dot' + (idx === 0 ? ' active' : '');
        dot.dataset.index = idx;
        dot.addEventListener('click', () => setWish(idx));
        dotsContainer.appendChild(dot);
      });

      function setWish(index) {
        currentWish = index;
        const w = wishes[index];
        wishText.innerHTML = `<span class="emoji-big">${w.emoji}</span> ${w.text}`;
        document.querySelectorAll('.slider-dot').forEach((d, i) => {
          d.classList.toggle('active', i === index);
        });
      }

      setInterval(() => {
        const next = (currentWish + 1) % wishes.length;
        setWish(next);
      }, 5000);

      // МУЗЫКА
      const audio = document.getElementById('bgMusic');
      const musicToggle = document.getElementById('musicToggle');
      const musicLabel = document.getElementById('musicLabel');
      let isMusicPlaying = false;

      musicToggle.addEventListener('click', function() {
        if (isMusicPlaying) {
          audio.pause();
          isMusicPlaying = false;
          this.querySelector('.icon').textContent = '🔇';
          musicLabel.textContent = 'Включить';
        } else {
          audio.play().catch(() => {});
          isMusicPlaying = true;
          this.querySelector('.icon').textContent = '🎵';
          musicLabel.textContent = 'Выключить';
        }
      });

      // ОТКРЫТКА
      const modalOverlay = document.getElementById('modalOverlay');
      const modalCard = document.getElementById('modalCard');
      const modalContent = document.getElementById('modalContent');
      const openCardTrigger = document.getElementById('openCardTrigger');

      function updateModalContent() {
        if (isBirthday) {
          modalCard.classList.remove('locked');
          modalContent.innerHTML = `
            <h2>💌 Для тебя, сестрёнка</h2>
            <p>
              С 17-летием! 🥳<br><br>
              Ты становишься взрослее, но в моём сердце ты навсегда останешься той же
              чудесной, смешной и доброй девочкой. Желаю тебе огромной любви,
              верных друзей, ярких приключений и чтобы все твои мечты сбывались!<br><br>
              Я рядом, всегда. ❤️
            </p>
            <button class="close-modal" id="closeModal">Закрыть ❤️</button>
          `;
          document.getElementById('closeModal').addEventListener('click', () => {
            modalOverlay.classList.remove('show');
          });
        } else {
          modalCard.classList.add('locked');
          const day = String(BIRTHDAY_DATE.getDate()).padStart(2, '0');
          const month = String(BIRTHDAY_DATE.getMonth() + 1).padStart(2, '0');
          modalContent.innerHTML = `
            <span class="lock-icon">🔒</span>
            <h2>Ещё не время!</h2>
            <p id="lockMessage">
              Откроется <strong>${day}.${month}</strong> 🎂<br>
              Жди с нетерпением! 😉
            </p>
            <button class="close-modal" id="closeModal">Закрыть</button>
          `;
          document.getElementById('closeModal').addEventListener('click', () => {
            modalOverlay.classList.remove('show');
          });
        }
      }

      openCardTrigger.addEventListener('click', function() {
        updateModalContent();
        modalOverlay.classList.add('show');

        if (isBirthday) {
          createConfetti(80);
          setTimeout(() => createConfetti(60), 400);
          for (let i = 0; i < 5; i++) {
            setTimeout(() => {
              const symbols = ['💖', '❤️', '💗', '✨', '🎉'];
              for (let j = 0; j < 6; j++) {
                const el = document.createElement('div');
                el.className = 'flying-heart';
                el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                el.style.left = (20 + Math.random() * 60) + '%';
                el.style.top = (30 + Math.random() * 40) + '%';
                el.style.fontSize = (2.4 + Math.random() * 2.6) + 'rem';
                el.style.animationDuration = (1.8 + Math.random() * 1.6) + 's';
                document.body.appendChild(el);
                setTimeout(() => { if (el.parentNode) el.remove(); }, 3500);
              }
            }, i * 300);
          }
        }
      });

      modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) modalOverlay.classList.remove('show');
      });

      // Стартовый фейерверк
      window.addEventListener('load', () => {
        setTimeout(() => createConfetti(40), 400);
        setTimeout(() => createConfetti(30), 900);
      });

    })();
  </script>
</body>
</html>
