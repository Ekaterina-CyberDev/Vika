<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Вика, с днем рождения! 🎉</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      background: linear-gradient(145deg, #0b0e1a 0%, #1a1f35 100%);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 10px;
      overflow: hidden;
      position: relative;
      touch-action: none;
    }

    .container {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 32px;
      padding: 24px 14px 20px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
      z-index: 10;
      position: relative;
      margin: auto;
    }

    h1 {
      font-size: clamp(1.8rem, 6vw, 2.6rem);
      font-weight: 800;
      background: linear-gradient(to right, #f7e05e, #ffb07c, #ff7eb3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 2px;
      line-height: 1.2;
    }

    .subtitle {
      font-size: clamp(0.85rem, 2.5vw, 1.1rem);
      opacity: 0.8;
      font-weight: 300;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }

    .subtitle span {
      color: #ffb07c;
      font-weight: 600;
      -webkit-text-fill-color: #ffb07c;
    }

    .timer-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin: 10px 0 14px;
    }

    .timer-item {
      background: rgba(0, 0, 0, 0.35);
      border-radius: 18px;
      padding: 10px 4px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .timer-number {
      font-size: clamp(2rem, 7vw, 3rem);
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(180deg, #fff 30%, #b3b9e0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .timer-label {
      font-size: clamp(0.5rem, 1.5vw, 0.7rem);
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.5;
      margin-top: 2px;
    }

    .kiss-counter {
      font-size: clamp(1rem, 3vw, 1.3rem);
      margin: 4px 0 10px;
      opacity: 0.9;
    }

    .kiss-counter span {
      font-size: clamp(1.4rem, 4.5vw, 2rem);
      font-weight: 800;
      color: #ff7eb3;
      -webkit-text-fill-color: #ff7eb3;
    }

    .btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 8px 0 10px;
    }

    .action-btn {
      border: none;
      padding: 16px 10px;
      border-radius: 50px;
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transition: transform 0.15s ease;
      border: 1px solid rgba(255, 255, 255, 0.1);
      touch-action: manipulation;
      position: relative;
      overflow: hidden;
      min-height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .action-btn:active {
      transform: scale(0.92);
    }

    .action-btn .btn-icon {
      font-size: clamp(1.2rem, 3vw, 1.6rem);
    }

    #fireBtn {
      background: linear-gradient(135deg, #ff6b8a, #ee5a6f);
      box-shadow: 0 6px 25px rgba(255, 80, 120, 0.4);
    }

    #kissBtn {
      background: linear-gradient(135deg, #f7d44a, #f5a962);
      box-shadow: 0 6px 25px rgba(255, 200, 80, 0.35);
      color: #1a1a2e;
    }

    #kissBtn .btn-icon {
      color: #1a1a2e;
    }

    .wishes-slider {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 28px;
      padding: 16px 12px;
      margin: 10px 0 10px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      min-height: 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .wish-text {
      font-size: clamp(0.95rem, 2.8vw, 1.15rem);
      font-weight: 400;
      line-height: 1.5;
      opacity: 0.95;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      word-break: break-word;
    }

    .wish-text .emoji-big {
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      margin-right: 8px;
      flex-shrink: 0;
    }

    .slider-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
    }

    .slider-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      border: none;
      cursor: pointer;
      transition: 0.3s;
      padding: 0;
      touch-action: manipulation;
    }

    .slider-dot.active {
      background: #ff7eb3;
      box-shadow: 0 0 20px rgba(255, 117, 140, 0.5);
      transform: scale(1.3);
    }

    .music-btn {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 100;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 40px;
      padding: 8px 14px;
      color: #fff;
      font-size: clamp(0.7rem, 2vw, 0.85rem);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      touch-action: manipulation;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    .music-btn:active {
      transform: scale(0.92);
    }

    .music-btn .icon {
      font-size: clamp(1rem, 3vw, 1.3rem);
    }

    /* ФОНОВЫЕ СЕРДЦА */
    .heart-float {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      opacity: 0.08;
      animation: floatHeart 20s infinite ease-in-out;
      user-select: none;
    }

    @keyframes floatHeart {
      0% { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0.05; }
      50% { opacity: 0.2; transform: translateY(-30vh) rotate(20deg) scale(1.2); }
      100% { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0.05; }
    }

    /* КОНФЕТТИ */
    .confetti-piece {
      position: fixed;
      width: 12px;
      height: 12px;
      top: -10px;
      z-index: 5;
      pointer-events: none;
      opacity: 0.9;
      border-radius: 2px;
      animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
      0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg) scale(0.1); opacity: 0; }
    }

    /* ЛЕТЯЩИЕ СЕРДЦА */
    .flying-heart {
      position: fixed;
      font-size: clamp(2rem, 7vw, 3.2rem);
      pointer-events: none;
      z-index: 50;
      animation: flyHeartUp 2s ease-out forwards;
      filter: drop-shadow(0 0 20px rgba(255, 80, 150, 0.5));
    }

    @keyframes flyHeartUp {
      0% { opacity: 1; transform: translateY(0) scale(0.2) rotate(0deg); }
      100% { opacity: 0; transform: translateY(-350px) scale(2) rotate(50deg); }
    }

    /* ВСПЫШКА */
    .flash-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 40;
      background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 60%);
      opacity: 0;
      animation: flashAnim 0.5s ease-out forwards;
    }

    @keyframes flashAnim {
      0% { opacity: 1; transform: scale(0.3); }
      100% { opacity: 0; transform: scale(2.5); }
    }

    /* ОТКРЫТКА */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 200;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      padding: 20px;
    }

    .modal-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .modal-card {
      background: linear-gradient(145deg, #1e243f, #2a3150);
      border-radius: 40px;
      padding: 32px 20px;
      max-width: 400px;
      width: 100%;
      border: 1px solid rgba(255, 215, 0, 0.15);
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
      transform: scale(0.9);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .modal-overlay.show .modal-card {
      transform: scale(1);
    }

    .modal-card h2 {
      font-size: clamp(1.4rem, 5vw, 2rem);
      margin-bottom: 10px;
      background: linear-gradient(to right, #f7e05e, #ffb07c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .modal-card p {
      font-size: clamp(0.95rem, 2.8vw, 1.1rem);
      line-height: 1.7;
      opacity: 0.9;
      margin-bottom: 18px;
    }

    .modal-card .close-modal {
      background: linear-gradient(135deg, #ff7eb3, #ff758c);
      border: none;
      padding: 12px 32px;
      border-radius: 50px;
      font-size: clamp(0.9rem, 2.5vw, 1rem);
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: 0 6px 25px rgba(255, 117, 140, 0.3);
    }

    .modal-card .close-modal:active {
      transform: scale(0.94);
    }

    .modal-card.locked .lock-icon {
      font-size: clamp(2.8rem, 10vw, 4rem);
      margin-bottom: 10px;
      display: block;
    }

    .modal-card.locked h2 {
      font-size: clamp(1.2rem, 4vw, 1.6rem);
      background: linear-gradient(to right, #aaa, #ddd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .modal-card.locked p {
      opacity: 0.5;
      font-size: clamp(0.85rem, 2.5vw, 1rem);
    }

    .modal-card.locked .close-modal {
      background: #555;
      box-shadow: none;
    }

    .open-card-trigger {
      font-size: clamp(0.75rem, 2vw, 0.85rem);
      margin-top: 6px;
      opacity: 0.6;
      cursor: pointer;
      touch-action: manipulation;
      padding: 6px 0;
      transition: opacity 0.2s;
    }

    .open-card-trigger:active {
      opacity: 1;
    }

    @media (max-width: 420px) {
      .container { padding: 16px 10px 14px; border-radius: 24px; }
      .btn-group { gap: 8px; }
      .action-btn { padding: 14px 8px; min-height: 48px; font-size: 0.85rem; }
      .timer-item { padding: 6px 2px; }
      .wishes-slider { padding: 12px 8px; min-height: 70px; }
    }

    @media (max-width: 350px) {
      .timer-number { font-size: 1.6rem; }
      .action-btn { font-size: 0.75rem; padding: 10px 6px; min-height: 42px; }
    }
  </style>
</head>
<body>

  <div id="hearts-container"></div>

  <button class="music-btn" id="musicToggle">
    <span class="icon">🔇</span>
    <span id="musicLabel">Включить</span>
  </button>

  <div class="container">
    <h1>🎂 С Днём Рождения!</h1>
    <div class="subtitle">Моя <span>самая лучшая</span> сестра ❤️</div>

    <div class="timer-grid">
      <div class="timer-item">
        <div class="timer-number" id="days">00</div>
        <div class="timer-label">Дней</div>
      </div>
      <div class="timer-item">
        <div class="timer-number" id="hours">00</div>
        <div class="timer-label">Часов</div>
      </div>
      <div class="timer-item">
        <div class="timer-number" id="minutes">00</div>
        <div class="timer-label">Минут</div>
      </div>
      <div class="timer-item">
        <div class="timer-number" id="seconds">00</div>
        <div class="timer-label">Секунд</div>
      </div>
    </div>

    <div class="kiss-counter">
      💋 Поцелуев: <span id="kissCount">0</span>
    </div>

    <div class="btn-group">
      <button class="action-btn" id="fireBtn">
        <span class="btn-icon">🎉</span> Фейерверк
      </button>
      <button class="action-btn" id="kissBtn">
        <span class="btn-icon">💋</span> Чмок!
      </button>
    </div>

    <div class="wishes-slider">
      <div class="wish-text" id="wishText">
        <span class="emoji-big">🌟</span>
        Ты — моё самое яркое вдохновение!
      </div>
      <div class="slider-dots" id="sliderDots"></div>
    </div>

    <div class="open-card-trigger" id="openCardTrigger">
      ❤️ Открыть поздравление
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-card" id="modalCard">
      <div id="modalContent">
        <span class="lock-icon">🔒</span>
        <h2>Ещё не время!</h2>
        <p id="lockMessage">Откроется 8 июля 🎂</p>
        <button class="close-modal" id="closeModal">Закрыть</button>
      </div>
    </div>
  </div>

  <audio id="bgMusic" loop preload="auto">
    <source src="barbariki.mp3" type="audio/mpeg">
  </audio>

  <script>
    (function() {
      "use strict";

      // === ДАТА РОЖДЕНИЯ ===
      const BIRTHDAY_DATE = new Date('2026-07-08T00:00:00');
      const birthday = BIRTHDAY_DATE.getTime();

      const today = new Date();
      const isBirthday =
        today.getDate() === BIRTHDAY_DATE.getDate() &&
        today.getMonth() === BIRTHDAY_DATE.getMonth();

      // === ТАЙМЕР ===
      const daysEl = document.getElementById('days');
      const hoursEl = document.getElementById('hours');
      const minutesEl = document.getElementById('minutes');
      const secondsEl = document.getElementById('seconds');

      function updateTimer() {
        const now = Date.now();
        let diff = birthday - now;
        if (diff < 0) diff = 0;

        daysEl.textContent = String(Math.floor(diff / (1000 * 60 * 60 * 24))).padStart(2, '0');
        hoursEl.textContent = String(Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, '0');
        minutesEl.textContent = String(Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
        secondsEl.textContent = String(Math.floor((diff % (1000 * 60)) / 1000)).padStart(2, '0');
      }

      updateTimer();
      setInterval(updateTimer, 1000);

      // === ФОНОВЫЕ СЕРДЦА ===
      const heartsContainer = document.getElementById('hearts-container');
      const heartSymbols = ['♥', '❤', '💖', '💗', '💘'];

      for (let i = 0; i < 20; i++) {
        const heart = document.createElement('div');
        heart.className = 'heart-float';
        heart.textContent = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
        heart.style.left = Math.random() * 100 + '%';
        heart.style.top = Math.random() * 100 + '%';
        const size = 1 + Math.random() * 2.5;
        heart.style.fontSize = size + 'rem';
        heart.style.animationDuration = (15 + Math.random() * 25) + 's';
        heart.style.animationDelay = (Math.random() * 15) + 's';
        heartsContainer.appendChild(heart);
      }

      // === КОНФЕТТИ ===
      function createConfetti(count) {
        count = count || 80;
        const colors = ['#ff6b8a', '#f7d44a', '#6dd5ed', '#a18cd1', '#fbc2eb', '#ff9a56', '#8ec5fc', '#ffd700', '#ff6a88'];
        const container = document.body;

        for (let i = 0; i < count; i++) {
          const piece = document.createElement('div');
          piece.className = 'confetti-piece';
          const size = 6 + Math.random() * 12;
          const color = colors[Math.floor(Math.random() * colors.length)];
          const left = Math.random() * 100;
          const duration = 2 + Math.random() * 4;
          const delay = Math.random() * 0.8;

          piece.style.width = size + 'px';
          piece.style.height = size + 'px';
          piece.style.background = color;
          piece.style.left = left + '%';
          piece.style.animationDuration = duration + 's';
          piece.style.animationDelay = delay + 's';
          piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
          piece.style.boxShadow = '0 0 6px ' + color;

          container.appendChild(piece);
          setTimeout(() => { if (piece.parentNode) piece.remove(); }, (duration + delay) * 1000 + 100);
        }
      }

      // === ВСПЫШКА ===
      function createFlash() {
        const flash = document.createElement('div');
        flash.className = 'flash-overlay';
        document.body.appendChild(flash);
        setTimeout(() => { if (flash.parentNode) flash.remove(); }, 600);
      }

      // === ЛЕТЯЩИЕ СЕРДЦА ===
      function flyHearts(count) {
        count = count || 12;
        const symbols = ['💋', '❤️', '💖', '💗', '♥️', '✨', '💕', '🌸', '🌺', '💝'];
        const container = document.body;

        for (let i = 0; i < count; i++) {
          const el = document.createElement('div');
          el.className = 'flying-heart';
          el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
          el.style.left = (5 + Math.random() * 90) + '%';
          el.style.top = (10 + Math.random() * 60) + '%';
          el.style.fontSize = (1.8 + Math.random() * 2.8) + 'rem';
          el.style.animationDuration = (1.4 + Math.random() * 1.8) + 's';
          container.appendChild(el);
          setTimeout(() => { if (el.parentNode) el.remove(); }, 3500);
        }
      }

      // === ОБРАБОТЧИКИ КНОПОК (универсальные) ===
      function setupButton(btnId, handler) {
        const btn = document.getElementById(btnId);
        if (!btn) return;

        // Основной обработчик
        btn.addEventListener('click', function(e) {
          e.preventDefault();
          handler.call(this, e);
        });

        // Для мобильных - дополнительный обработчик touch
        btn.addEventListener('touchstart', function(e) {
          // Предотвращаем двойной вызов
          if (!this._touched) {
            this._touched = true;
            // Не preventDefault, чтобы click тоже сработал
          }
        }, { passive: true });

        btn.addEventListener('touchend', function(e) {
          this._touched = false;
        }, { passive: true });
      }

      // === ФЕЙЕРВЕРК ===
      setupButton('fireBtn', function(e) {
        createConfetti(130);
        createFlash();
        this.style.transform = 'scale(0.92)';
        setTimeout(() => { this.style.transform = ''; }, 150);
        const orig = this.innerHTML;
        this.innerHTML = '<span class="btn-icon">✨</span> Ура!';
        setTimeout(() => { this.innerHTML = orig; }, 900);
      });

      // === ПОЦЕЛУИ ===
      let kissCount = 0;
      const kissCountEl = document.getElementById('kissCount');

      setupButton('kissBtn', function(e) {
        kissCount++;
        kissCountEl.textContent = kissCount;
        flyHearts(18);
        createConfetti(40);
        createFlash();

        this.style.transform = 'scale(0.92)';
        setTimeout(() => { this.style.transform = ''; }, 150);

        const orig = this.innerHTML;
        this.innerHTML = '<span class="btn-icon">😘</span> Чмок!';
        setTimeout(() => { this.innerHTML = orig; }, 700);
      });

      // === СЛАЙДЕР ПОЖЕЛАНИЙ ===
      const wishes = [
        { emoji: '🌟', text: 'Ты — моё самое яркое вдохновение!' },
        { emoji: '🌈', text: 'Пусть жизнь будет такой же красочной, как радуга!' },
        { emoji: '🦋', text: 'Летай высоко и никого не слушай. Ты — особенная!' },
        { emoji: '🌺', text: 'Твоя улыбка согревает всех вокруг. Сияй!' },
        { emoji: '💎', text: 'Ты — настоящий бриллиант. С Днём Рождения!' }
      ];

      let currentWish = 0;
      const wishText = document.getElementById('wishText');
      const dotsContainer = document.getElementById('sliderDots');

      wishes.forEach((_, idx) => {
        const dot = document.createElement('button');
        dot.className = 'slider-dot' + (idx === 0 ? ' active' : '');
        dot.dataset.index = idx;
        dot.addEventListener('click', () => setWish(idx));
        dot.addEventListener('touchstart', function(e) {
          // Просто чтобы сработал click
        }, { passive: true });
        dotsContainer.appendChild(dot);
      });

      function setWish(index) {
        currentWish = index;
        const w = wishes[index];
        wishText.innerHTML = `<span class="emoji-big">${w.emoji}</span> ${w.text}`;
        document.querySelectorAll('.slider-dot').forEach((d, i) => {
          d.classList.toggle('active', i === index);
        });
      }

      setInterval(() => {
        const next = (currentWish + 1) % wishes.length;
        setWish(next);
      }, 5000);

      // === МУЗЫКА ===
      const audio = document.getElementById('bgMusic');
      const musicToggle = document.getElementById('musicToggle');
      const musicLabel = document.getElementById('musicLabel');
      let isMusicPlaying = false;

      musicToggle.addEventListener('click', function() {
        if (isMusicPlaying) {
          audio.pause();
          isMusicPlaying = false;
          this.querySelector('.icon').textContent = '🔇';
          musicLabel.textContent = 'Включить';
        } else {
          audio.play().catch(() => {});
          isMusicPlaying = true;
          this.querySelector('.icon').textContent = '🎵';
          musicLabel.textContent = 'Выключить';
        }
      });

      // === ОТКРЫТКА ===
      const modalOverlay = document.getElementById('modalOverlay');
      const modalCard = document.getElementById('modalCard');
      const modalContent = document.getElementById('modalContent');
      const openCardTrigger = document.getElementById('openCardTrigger');

      function updateModalContent() {
        if (isBirthday) {
          modalCard.classList.remove('locked');
          modalContent.innerHTML = `
            <h2>💌 Для тебя, сестрёнка</h2>
            <p>
              С 17-летием! 🥳<br><br>
              Ты становишься взрослее, но в моём сердце ты навсегда останешься той же
              чудесной, смешной и доброй девочкой. Желаю тебе огромной любви,
              верных друзей, ярких приключений и чтобы все твои мечты сбывались!<br><br>
              Я рядом, всегда. ❤️
            </p>
            <button class="close-modal" id="closeModal">Закрыть ❤️</button>
          `;
          document.getElementById('closeModal').addEventListener('click', () => {
            modalOverlay.classList.remove('show');
          });
        } else {
          modalCard.classList.add('locked');
          const day = String(BIRTHDAY_DATE.getDate()).padStart(2, '0');
          const month = String(BIRTHDAY_DATE.getMonth() + 1).padStart(2, '0');
          modalContent.innerHTML = `
            <span class="lock-icon">🔒</span>
            <h2>Ещё не время!</h2>
            <p id="lockMessage">
              Откроется <strong>${day}.${month}</strong> 🎂<br>
              Жди с нетерпением! 😉
            </p>
            <button class="close-modal" id="closeModal">Закрыть</button>
          `;
          document.getElementById('closeModal').addEventListener('click', () => {
            modalOverlay.classList.remove('show');
          });
        }
      }

      openCardTrigger.addEventListener('click', function() {
        updateModalContent();
        modalOverlay.classList.add('show');

        if (isBirthday) {
          createConfetti(70);
          setTimeout(() => createConfetti(50), 400);
          setTimeout(() => flyHearts(10), 200);
          setTimeout(() => flyHearts(8), 600);
        }
      });

      // Закрытие по клику на фон
      modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) modalOverlay.classList.remove('show');
      });

      // === СТАРТОВЫЙ ФЕЙЕРВЕРК ===
      setTimeout(() => createConfetti(35), 500);
      setTimeout(() => createConfetti(25), 1000);

      // === ДОПОЛНИТЕЛЬНО: встряска для мобильных ===
      // Если пользователь трясёт телефон - конфетти
      if (window.DeviceMotionEvent) {
        let lastShake = 0;
        window.addEventListener('devicemotion', function(e) {
          const acc = e.accelerationIncludingGravity;
          if (!acc) return;
          const total = Math.abs(acc.x) + Math.abs(acc.y) + Math.abs(acc.z);
          const now = Date.now();
          if (total > 25 && now - lastShake > 1000) {
            lastShake = now;
            createConfetti(60);
            flyHearts(8);
          }
        }, { passive: true });
      }

      console.log('🚀 Мобильная версия готова!');
      console.log(isBirthday ? '🎉 СЕГОДНЯ ДЕНЬ РОЖДЕНИЯ!' : '🔒 Открытка заблокирована');

    })();
  </script>
</body>
</html>
